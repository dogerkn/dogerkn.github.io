{% include ads.html %}
<div class="wrapper-masthead">
    <div class="container">
      <header class="masthead clearfix">
        <div class="masthead-top">
          <a href="{{ site.baseurl }}/" class="logo"><amp-img alt="Devblog Logo" src="{{ site.baseurl }}{{ site.logo }}" width="150" height="150" /></a>
          <a href="https://dogeminer2.com/discord" target="_blank" class="header-discord" aria-label="Join our Discord">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 127.14 96.36"><path d="M107.7 8.07A105.15 105.15 0 0 0 81.47 0a72.06 72.06 0 0 0-3.36 6.83 97.68 97.68 0 0 0-29.11 0A72.37 72.37 0 0 0 45.64 0 105.89 105.89 0 0 0 19.39 8.09C2.79 32.65-1.71 56.6.54 80.21a105.73 105.73 0 0 0 32.17 16.15 77.7 77.7 0 0 0 6.89-11.11 68.42 68.42 0 0 1-10.85-5.18c.91-.66 1.8-1.34 2.66-2.03a75.57 75.57 0 0 0 64.32 0c.87.71 1.76 1.39 2.66 2.03a68.68 68.68 0 0 1-10.87 5.19 77 77 0 0 0 6.89 11.1 105.25 105.25 0 0 0 32.19-16.14c2.64-27.38-4.51-51.11-18.9-72.15ZM42.45 65.69C36.18 65.69 31 60 31 53.05s5-12.68 11.45-12.68S54 46.07 53.89 53.05c0 6.95-5.11 12.64-11.44 12.64Zm42.24 0C78.41 65.69 73.25 60 73.25 53.05s5-12.68 11.44-12.68S96.23 46.07 96.12 53.05c0 6.95-5.08 12.64-11.43 12.64Z"/></svg>
            <span class="header-discord-label">Join our Discord</span>
          </a>
          <div class="top-teaser">
            <div class="isRight">
              <h5 class="index-headline featured"><span>DEVELOPER</span></h5>
              <section class="author">
                <a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" class="freelink"><div class="author-image"></div></a>
                <h4><a href="https://twitter.com/{{ site.twitter_username }}" target="_blank" class="freelink">{{ site.name }}</a></h4>
                <p class="bio">{{site.bio}}</p>
                <p>
                  <span>
                    {% if site.twitter_username %}
                      {% include icon-twitter.html username=site.twitter_username %}
                    {% endif %}
                  </span>
                </p>
              </section>
            </div>
          </div>
        </div>
        <div class="site-info clearfix">
          <h1 class="site-name"><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
          <p class="site-description">{{ site.description }}</p>
          <nav>
            <a href="https://dogeminer2.com/">dogeminer2.com</a>
          </nav>
        </div>
      </header>
    </div>
  </div>
  <amp-auto-ads type="adsense"
        data-ad-client="ca-pub-3248552182676022">
</amp-auto-ads>
